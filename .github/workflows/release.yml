name: Release

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  tag-and-release:
    name: Tag and release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # A PAT lets the created release trigger publish.yml. A GITHUB_TOKEN
          # release does NOT trigger downstream workflows by design. Falls back
          # to GITHUB_TOKEN (then publish.yml can be run via workflow_dispatch).
          token: ${{ secrets.RELEASE_PAT != '' && secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}

      - name: Read version from package.json
        id: ver
        run: |
          v=$(node -p "require('./package.json').version")
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "package.json version: $v"

      - name: Check if tag already exists
        id: check
        run: |
          if git rev-parse "v${{ steps.ver.outputs.version }}" >/dev/null 2>&1; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Tag v${{ steps.ver.outputs.version }} exists; nothing to release."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Tag and create release
        if: steps.check.outputs.skip == 'false'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT != '' && secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          v="${{ steps.ver.outputs.version }}"
          IFS='.' read -r major minor _patch <<< "$v"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # Only tags are pushed (refs/tags/*); main is protected and is never
          # written to from CI. The version is bumped in the PR, not here.
          git tag "v$v"
          git tag -f "v$major"
          git tag -f "v$major.$minor"
          git push origin "v$v"
          git push origin "v$major" --force
          git push origin "v$major.$minor" --force
          gh release create "v$v" --title "v$v" --generate-notes
